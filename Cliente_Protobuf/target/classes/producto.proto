syntax = "proto3";

option java_package = "com.mycompany.cliente_protobuf";
option java_outer_classname = "ProductoProto";

message Producto {
  string clave = 1;
  string nombre = 2;
  double precio = 3;
  int32 cantidad = 4;
  string marca = 5;
  string fechaReg = 6;
}

message ListaProductos {
  repeated Producto productos = 1;
}